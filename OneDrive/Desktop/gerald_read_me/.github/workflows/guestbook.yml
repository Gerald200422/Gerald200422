name: Guestbook

on:
  issues:
    types: [opened]

jobs:
  update_readme:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'guestbook')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Guestbook Action
        uses: joshmgross/guestbook@v0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          template: '> **${{ github.event.issue.user.login }}**: ${{ github.event.issue.title }}'
          max_entries: 5
